<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 md:p-8">
  <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
    
    <div class="bg-[#e11d48] p-8 text-white text-center">
      <h2 class="text-3xl font-extrabold mb-2">Contactez-nous</h2>
      <p class="text-red-100">Une question ou un projet ? Écrivez-nous un message.</p>
    </div>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="p-6 md:p-10 space-y-6">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label class="font-bold text-slate-700 text-sm uppercase tracking-wide">Nom complet</label>
          <input pInputText formControlName="nom" placeholder="Jean Dupont"
                 [ngClass]="{'ng-invalid ng-dirty': contactForm.get('nom')?.invalid && contactForm.get('nom')?.touched}"
                 class="w-full p-3 border-slate-200 rounded-lg focus:ring-2 focus:ring-red-500 shadow-sm" />
          <small class="text-red-500 font-medium" *ngIf="contactForm.get('nom')?.invalid && contactForm.get('nom')?.touched">
            Le nom est requis (min 3 car.)
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-bold text-slate-700 text-sm uppercase tracking-wide">Adresse Email</label>
          <input pInputText formControlName="email" placeholder="nom@exemple.com"
                 [ngClass]="{'ng-invalid ng-dirty': contactForm.get('email')?.invalid && contactForm.get('email')?.touched}"
                 class="w-full p-3 border-slate-200 rounded-lg shadow-sm" />
          <small class="text-red-500 font-medium" *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
            Email invalide
          </small>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="font-bold text-slate-700 text-sm uppercase tracking-wide">Sujet</label>
        <input pInputText formControlName="sujet" placeholder="De quoi s'agit-il ?"
               [ngClass]="{'ng-invalid ng-dirty': contactForm.get('sujet')?.invalid && contactForm.get('sujet')?.touched}"
               class="w-full p-3 border-slate-200 rounded-lg shadow-sm" />
      </div>

      <div class="flex flex-col gap-2">
        <label class="font-bold text-slate-700 text-sm uppercase tracking-wide">Message</label>
        <textarea pInputTextarea formControlName="message" rows="5" autoResize="false"
                  placeholder="Écrivez votre message ici..."
                  [ngClass]="{'ng-invalid ng-dirty': contactForm.get('message')?.invalid && contactForm.get('message')?.touched}"
                  class="w-full p-3 border-slate-200 rounded-lg shadow-sm"></textarea>
        <small class="text-red-500 font-medium" *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched">
          Le message doit contenir au moins 10 caractères.
        </small>
      </div>

      <div class="pt-4">
        <button type="submit" 
          [disabled]="loadingBtn"
          class="w-full py-4 bg-[#e11d48] hover:bg-red-600 text-white rounded-xl text-lg font-bold shadow-lg transition-all active:scale-95 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
        @if (loadingBtn) {
          <i class="pi pi-spin pi-spinner"></i> Envoi en cours...
        } @else {
          <i class="pi pi-send"></i> Envoyer le message
        }
      </button>
            </div>
    </form>
  </div>
</div>

<p-toast />
